esphome:
  name: esphome-web-587cd4
  friendly_name: BLE_Bridge
  min_version: 2025.11.0
  name_add_mac_suffix: false

esp32:
  variant: esp32
  framework:
    type: arduino

# Enable logging
#logger:

# Enable Home Assistant API
api:

# Allow Over-The-Air updates
ota:
- platform: esphome

wifi:
  ssid: "Muswa Wifi 6"
  password: "MUSWA3559"
  use_address: 192.168.68.59

# 1. Back to standard debug (cleaner to read)
logger:
  level: DEBUG

# 2. Configure the tracker
esp32_ble_tracker:

# 3. THE TRAP: Adding a dummy presence sensor forces the 
# tracker to actually process and log every device it sees.
sensor:
  - platform: xiaomi_hhccjcy01
    mac_address: '5C:85:7E:14:47:5E'
    temperature:
      name: "Plant Temperature"
    moisture:
      name: "Plant Moisture"
    illuminance:
      name: "Plant Light"
    conductivity:
      name: "Plant Soil Conductivity"
    battery_level:
      name: "Battery"

# 4. Creates tiny web server on microcontroller
web_server:
  port: 80

# 5. Formats the sensor data specifically for your database
prometheus:
  

